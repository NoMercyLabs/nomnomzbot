name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  # Personal namespace — inherits the repo's public visibility without org admin.
  IMAGE_NAME: stoney_eagle/nomnomzbot

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA layer cache — the wasm-build stage is only re-run when Kotlin source changes.
          # On backend-only commits the 25-minute Wasm compile is a cache hit.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on master pushes, and only when the DEPLOY_HOST secret is configured.
    # To enable: add DEPLOY_HOST (server IP/hostname) and DEPLOY_SSH_KEY (private key) as
    # repository secrets, and make sure the server can pull from ghcr.io/nomercylabs/nomnomzbot.
    if: >
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/stoney_eagle/nomnomzbot:latest
            cd /opt/nomnomzbot
            API_IMAGE=ghcr.io/stoney_eagle/nomnomzbot:latest \
              docker compose up -d --no-deps --pull always api
            docker compose logs api --tail=20
