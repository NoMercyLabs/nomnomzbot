#
# Run from the repo root:
#   cp .env.example .env   (or use ./deploy.sh which does this automatically)
#   docker compose up -d --build

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nomnomzbot-api
    ports:
      - "${API_HTTP_PORT:-5080}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - App__DeploymentMode=${DEPLOYMENT_MODE:-self-hosted}
      - App__BaseUrl=${API_BASE_URL:-http://localhost:5080}
      - App__FrontendUrl=${FRONTEND_URL:-http://localhost:8081}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-nomnomzbot};Username=${POSTGRES_USER:-nomnomzbot};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-nomnomzbot}
      - Jwt__Audience=${JWT_AUDIENCE:-nomnomzbot}
      - Encryption__Key=${ENCRYPTION_KEY}
      - Twitch__ClientId=${TWITCH_CLIENT_ID}
      - Twitch__ClientSecret=${TWITCH_CLIENT_SECRET}
      - Twitch__BotUsername=${TWITCH_BOT_USERNAME:-NomNomzBot}
      - Spotify__ClientId=${SPOTIFY_CLIENT_ID:-}
      - Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET:-}
      - Discord__ClientId=${DISCORD_CLIENT_ID:-}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET:-}
      - YouTube__ClientId=${YOUTUBE_CLIENT_ID:-}
      - YouTube__ClientSecret=${YOUTUBE_CLIENT_SECRET:-}
      - Azure__Tts__ApiKey=${AZURE_TTS_API_KEY:-}
      - Azure__Tts__Region=${AZURE_TTS_REGION:-westeurope}
      - ElevenLabs__ApiKey=${ELEVENLABS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - nomnomzbot

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        # EXPO_PUBLIC_API_URL is baked into the JS bundle — must be your public API domain
        EXPO_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:5080}
    container_name: nomnomzbot-web
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nomnomzbot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nomnomzbot}
      POSTGRES_USER: ${POSTGRES_USER:-nomnomzbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomnomzbot_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomnomzbot} -d ${POSTGRES_DB:-nomnomzbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nomnomzbot

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - nomnomzbot

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nomnomzbot

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nomnomzbot-tunnel
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nomnomzbot

volumes:
  postgres_data:

networks:
  nomnomzbot:
    driver: bridge
