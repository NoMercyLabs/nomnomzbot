# Development-only overrides. Layer on top of the production compose:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Adds Adminer (Postgres GUI). It is deliberately kept out of docker-compose.yml because it exposes
# full database access behind only the Postgres credentials — never run it in production.

services:
  adminer:
    image: adminer:latest
    # Loopback only, even in dev — no reason to expose the DB GUI on every interface.
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8082}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nomnomzbot
