services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomnomzbot-api
    ports:
      - "${API_HTTP_PORT:-5080}:5000"
      - "${API_HTTPS_PORT:-5081}:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - App__DeploymentMode=${DEPLOYMENT_MODE:-self-hosted}
      - ConnectionStrings__DefaultConnection=${DATABASE_URL:-Host=postgres;Port=5432;Database=nomnomzbot;Username=nomnomzbot;Password=nomnomzbot_dev}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-nomnomzbot}
      - Jwt__Audience=${JWT_AUDIENCE:-nomnomzbot}
      - Encryption__Key=${ENCRYPTION_KEY}
      - App__BaseUrl=${API_BASE_URL:-http://localhost:5080}
      - App__InitialAdminTwitchId=${INITIAL_ADMIN_TWITCH_ID:-}
      # Trust X-Forwarded-* only from the proxy in front of the API. Leave blank for a reverse proxy on the
      # host (loopback is trusted by default); set it to the proxy's network when the proxy reaches the API
      # over the docker bridge — e.g. TRUSTED_PROXY_NETWORKS=172.16.0.0/12 for the cloudflared sidecar below.
      - ForwardedHeaders__KnownNetworks__0=${TRUSTED_PROXY_NETWORKS:-}
      - Twitch__ClientId=${TWITCH_CLIENT_ID}
      - Twitch__ClientSecret=${TWITCH_CLIENT_SECRET}
      - Twitch__BotUsername=${TWITCH_BOT_USERNAME}
      - Spotify__ClientId=${SPOTIFY_CLIENT_ID:-}
      - Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET:-}
      - Discord__ClientId=${DISCORD_CLIENT_ID:-}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET:-}
      - YouTube__ClientId=${YOUTUBE_CLIENT_ID:-}
      - YouTube__ClientSecret=${YOUTUBE_CLIENT_SECRET:-}
      - Azure__Tts__ApiKey=${AZURE_TTS_API_KEY:-}
      - Azure__Tts__Region=${AZURE_TTS_REGION:-westeurope}
      - ElevenLabs__ApiKey=${ELEVENLABS_API_KEY:-}
      - ConnectionStrings__Redis=${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - nomnomzbot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nomnomzbot
      POSTGRES_USER: ${POSTGRES_USER:-nomnomzbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomnomzbot_dev}
    # Bound to loopback only — Postgres is reached over the compose network, never from outside the host.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomnomzbot} -d nomnomzbot"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nomnomzbot

  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server
      $([ -n \"$REDIS_PASSWORD\" ] && echo \"--requirepass $REDIS_PASSWORD\")"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # Bound to loopback only — Redis is reached over the compose network, never from outside the host.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: >
        ["CMD-SHELL",
        "redis-cli $([ -n \"$REDIS_PASSWORD\" ] && echo \"-a $REDIS_PASSWORD\") ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - nomnomzbot

  # Adminer (DB GUI) is intentionally NOT in the production compose — it would expose full database
  # access with only the Postgres credentials. It lives in docker-compose.dev.yml; enable it locally with
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d adminer

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nomnomzbot-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nomnomzbot

volumes:
  postgres_data:

networks:
  nomnomzbot:
    driver: bridge
