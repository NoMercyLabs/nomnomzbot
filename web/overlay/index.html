<!DOCTYPE html>
<!--

  OBS overlay browser-source. URL: /overlay/{overlayToken}?w={widgetId}
  Connects to OverlayHub (?token=overlayToken), joins the widget, and renders pushed WidgetEvents
  as transient on-stream alerts. Background is transparent for OBS compositing.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlay</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 8vh;
      }
      .alert {
        min-width: 320px;
        max-width: 70vw;
        padding: 22px 30px;
        border-radius: 16px;
        text-align: center;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), rgba(0, 0, 0, 0.32));
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        animation: pop 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.4) both;
      }
      .alert.out { animation: fade 0.5s ease forwards; }
      .headline { font-size: 30px; font-weight: 800; margin: 0 0 4px; }
      .detail { font-size: 19px; opacity: 0.95; }
      .who { font-weight: 700; }
      @keyframes pop {
        from { transform: translateY(-24px) scale(0.92); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes fade { to { transform: translateY(-16px); opacity: 0; } }
      #nowplaying {
        position: fixed;
        left: 24px;
        bottom: 24px;
        display: none;
        align-items: center;
        gap: 12px;
        max-width: 60vw;
        padding: 12px 18px;
        border-radius: 12px;
        color: #fff;
        background: rgba(10, 11, 15, 0.82);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        font-size: 16px;
      }
      #nowplaying.on { display: flex; }
      #nowplaying .eq { color: #9146ff; font-size: 20px; }
      #nowplaying .track { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <div id="nowplaying"><span class="eq">♪</span><span class="track"></span></div>

    <!-- Vendored (bot-served, no external CDN) so the overlay works offline / on locked-down networks. -->
    <script src="/overlay/lib/signalr.min.js"></script>
    <script>
      const path = location.pathname.split("/").filter(Boolean);
      const token = decodeURIComponent(path[path.length - 1] || "");
      const widgetId = new URLSearchParams(location.search).get("w") || "alerts";
      const get = (o, k) => o?.[k] ?? o?.[k[0].toUpperCase() + k.slice(1)];

      const HEADLINES = {
        subscription: "New Subscriber!",
        resub: "Resub!",
        follow: "New Follower!",
        cheer: "Cheer!",
        raid: "Raid!",
        gift: "Gift Subs!",
      };

      let alertDurationMs = 5000;
      function applySettings(settings) {
        if (!settings) return;
        const accent = get(settings, "accentColor");
        if (accent) document.documentElement.style.setProperty("--accent", String(accent));
        const dur = Number(get(settings, "durationMs"));
        if (dur) alertDurationMs = Math.max(1000, Math.min(30000, dur));
      }

      function updateNowPlaying(data) {
        const box = document.getElementById("nowplaying");
        const track = get(data, "track");
        const playing = get(data, "isPlaying");
        if (!playing || !track) {
          box.classList.remove("on");
          return;
        }
        box.querySelector(".track").textContent = String(track);
        box.classList.add("on");
      }

      function show(evt) {
        const type = get(evt, "eventType") || "alert";
        const data = get(evt, "data") || {};
        if (type === "now_playing") return updateNowPlaying(data);
        const who = get(data, "user") || get(data, "userDisplayName") || "";
        const headline = HEADLINES[type] || type;
        let detail = escapeHtml(who);
        const tier = get(data, "tier");
        if (tier) detail += ` · Tier ${escapeHtml(String(tier))}`;
        const months = get(data, "months");
        if (months) detail += ` · ${escapeHtml(String(months))} mo`;
        const amount = get(data, "amount") ?? get(data, "bits") ?? get(data, "viewers");
        if (amount) detail += ` · ${escapeHtml(String(amount))}`;

        const el = document.createElement("div");
        el.className = "alert";
        el.innerHTML = `<p class="headline">${escapeHtml(headline)}</p><p class="detail who">${detail}</p>`;
        document.getElementById("stage").appendChild(el);
        setTimeout(() => el.classList.add("out"), alertDurationMs);
        setTimeout(() => el.remove(), alertDurationMs + 600);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );
      }

      async function connect() {
        if (!token || token === "overlay") return; // not a valid overlay URL
        const connection = new signalR.HubConnectionBuilder()
          .withUrl(`/hubs/overlay?token=${encodeURIComponent(token)}`)
          .withAutomaticReconnect()
          .build();

        connection.on("WidgetEvent", show);
        connection.on("WidgetReload", () => location.reload());

        async function join() {
          try {
            const res = await connection.invoke("JoinWidget", widgetId);
            applySettings(get(res, "initialState"));
          } catch {
            /* hub will retry on reconnect */
          }
        }
        connection.onreconnected(join);

        try {
          await connection.start();
          await join();
        } catch {
          setTimeout(connect, 4000); // backend not ready yet — retry
        }
      }

      connect();
    </script>
  </body>
</html>
